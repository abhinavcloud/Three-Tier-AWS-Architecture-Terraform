name: Resuabele Terraform Plan and Apply

description: This is a reusable workflow designed to initialise terraform and run terraform plan and upload the plan as an artifact

on:
  workflow_call:

    inputs:
       execution-environment:
         required: true
         type: string
       commit_sha:
          required: true
          type: string

jobs:
    terraform-plan-apply-reusable:
        runs-on: ubuntu-latest

        environment: ${{inputs.execution-environment}}
        

        defaults:
          run:
            working-directory: ${{vars.TF_ENVIRONMENT}}

        steps:

            - name: Checkout-code
              uses: actions/checkout@v3
              with:
                ref: ${{ inputs.commit_sha}}

            - name: Setup-aws
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{secrets.AWS_ARN}}
                aws-region: ap-south-1
            
            - name: setup-terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: ">= 1.13.0"

            - name: terraform-init
              run: terraform init -backend-config=dev_backend.hcl -migrate-state

            - name: terraform-plan
              run: terraform plan -out=tfplan

            - name: terraform-plan-show
              run: |
                    terraform show tfplan > tfplan.txt


            - name: upload-tfplan-artifact
              uses: actions/upload-artifact@v4
              with:
                name: tfplan
                path: ${{ vars.TF_ENVIRONMENT }}/tfplan.txt
                if-no-files-found: error

            - name: terraform-apply
              id: terraform-apply
              run: terraform apply tfplan 

