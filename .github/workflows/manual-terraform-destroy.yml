name: Manual Terraform destroy

description: This is a reusable workflow designed to run terrafrom destroy manually

on:
  workflow_dispatch:


    inputs:
        execution-environment:
          required: true
          type: choice
          default: dev
          options:
            - dev
            - test
            - staging
            - production
          confirm: 
            description: "Type DESTROY to confirm"

        

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
    manual-terraform-destroy:
        runs-on: ubuntu-latest

        environment: ${{inputs.execution-environment}}
        

        defaults:
          run:
            working-directory: ${{vars.TF_ENVIRONMENT}}

        steps:

            - name: Checkout-code
              uses: actions/checkout@v3

            - name: Setup-aws
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{secrets.AWS_ARN}}
                aws-region: ap-south-1
            
            - name: setup-terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: ">= 1.13.0"

            - name: terraform-init
              run: terraform init -backend-config=dev_backend.hcl -migrate-state

            - name: terraform-destroy
              run: terraform destroy -auto-approve