name: Deployment of AWS Three Tier Architecture

description: This deployment pipeline is used for deployment of AWS Three Tier Architecture via Terraform i Development Environment

on: 
    push:
        branches:
            - master

        paths-ignore:
            - /Environments/Test/**
            - /Environments/Staging/**
            - /Environments/Production/**

    workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write


concurrency:
  group: terraform-dev
  cancel-in-progress: false


jobs:
    terraform-plan-drift-check:
        uses: ./.github/workflows/reusable-terraform-plan-refresh-only-drift-check.yml
        with:
            execution-environment: dev

    terraform-plan-apply-if-no-drift:
        needs: terraform-plan-drift-check
        if: ${{needs.terraform-plan-drift-check.outputs.drift-check == '0'}}
        uses: ./.github/workflows/reusable-terraform-plan-apply.yml
        with:
            execution-environment: dev

    terrafrom-destroy:
        needs: terraform-plan-apply-if-no-drift
        if: ${{needs.terraform-plan-drift-check.outputs.drift-check == '0'}}
        uses: ./.github/workflows/reusable-terraform-plan-apply.yml
        with:
            execution-environment: dev




