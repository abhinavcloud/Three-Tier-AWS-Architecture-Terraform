name: Reusable Terraform drift check

description: This reusable workflow for terraform drift check

on:

    workflow_call:

      inputs:
        execution-environment:
          required: true
          type: string
        commit_sha:
          required: false
          type: string

      outputs:
        drift-check:
          value: ${{jobs.terraform-drift-check.outputs.drift-check}}



permissions:
  id-token: write
  contents: read
  issues: write

  #comment

jobs:
    
    terraform-drift-check:

      runs-on: ubuntu-latest

      environment: ${{inputs.execution-environment}}

      defaults:
          run:
            working-directory: ${{vars.TF_ENVIRONMENT}}

      outputs:
        drift-check: ${{steps.drift-check.outputs.exitcode}}

      env:
        TF_VAR_Environment: ${{vars.TF_ENV}}
        TF_VAR_Application: ${{vars.TF_APPLICATION}}
        TF_VAR_vpc_cidr: ${{vars.TF_VPC_CIDR}}  
        TF_VAR_instance_type: ${{vars.TF_INSTANCE_TYPE}}
        TF_VAR_allowed_ports: ${{vars.TF_ALLOWED_PORTS}}
        TF_VAR_cidr_blocks: ${{vars.TF_CIDR_BLOCKS}}


      steps:
            - name: Checkout-code
              uses: actions/checkout@v4
              with:
                ref: ${{ inputs.commit_sha || github.sha}}
 
            - name: Setup-aws
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{secrets.AWS_ARN}}
                aws-region: ap-south-1
            
            - name: setup-terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: ">= 1.13.0"

            - name: terraform-init
              run: terraform init -backend-config=${{inputs.execution-environment}}_backend.hcl
            
            
            - name: terraform-plan-drift-check
              id: drift-check
              run: |
                terraform plan -refresh-only -detailed-exitcode -out=drift-tfplan
                echo "exitcode=$?" >> $GITHUB_OUTPUT
              continue-on-error: true

            - name: terraform-plan-show
              run: |
                    terraform show  drift-tfplan > drift-tfplan.md

            - name: upload-tfplan-artifact
              uses: actions/upload-artifact@v4
              with:
                name: drift-tfplan-md
                path: ${{ vars.TF_ENVIRONMENT }}/drift-tfplan.md
                if-no-files-found: error

            - name: if-drift-plan-failed
              if: ${{steps.drift-check.outputs.exitcode == '1'}}
              run: |
                echo " Plan execution failed"
                exit 1
            
            - name: if-no-drift-detected
              id: no-drift-detected
              if : ${{steps.drift-check.outputs.exitcode == '0'}}
              run: |
                echo " No drift detected. Continue to plan"
            
           
            - name: if-drift-detected-then-create-issue
              if: ${{steps.drift-check.outputs.exitcode == '2'}}
              uses: peter-evans/create-issue-from-file@v5
              with:
                title: "Terraform Drift Detected on ${{inputs.execution-environment}} Environment"
                content-filepath: ${{ vars.TF_ENVIRONMENT }}/drift-tfplan.md
                labels: drift, ${{inputs.execution-environment}}-environment


