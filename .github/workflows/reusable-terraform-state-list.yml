name: Reusable Terraform state list

description: This is a reusable workflow designed to initialise terraform and run terraform state list
on:
  workflow_call:

    inputs:
        execution-environment:
          required: true
          type: string
        commit_sha:
          required: false
          type: string

jobs:
    terraform-show-state:
        runs-on: ubuntu-latest

        environment: ${{inputs.execution-environment}}
        

        defaults:
          run:
            working-directory: ${{vars.TF_ENVIRONMENT}}

        env:
          TF_VAR_Environment   = ${{vars.TF_ENV}}
          TF_VAR_Application   = ${{vars.TF_APPLICATION}}
          TF_VAR_vpc_cidr      = ${{vars.TF_VPC_CIDR}}  
          TF_VAR_instance_type = ${{vars.TF_INSTANCE_TYPE}}
          TF_VAR_allowed_ports = ${{vars.TF_ALLOWED_PORTS}}
          TF_VAR_cidr_blocks   = ${{vars.TF_CIDR_BLOCKS}}

        steps:

            - name: Checkout-code
              uses: actions/checkout@v4
              with:
                ref: ${{ inputs.commit_sha || github.sha}}

            - name: Setup-aws
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{secrets.AWS_ARN}}
                aws-region: ap-south-1
            
            - name: setup-terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: ">= 1.13.0"

            - name: terraform-init
              run: terraform init -backend-config=${{inputs.execution-environment}}_backend.hcl
            - name: check-resources
              run: terraform state list > state-file.txt
                
             

            - name: upload-state-artifact
              uses: actions/upload-artifact@v4
              with:
                name: state-file-after-destory
                path: ${{vars.TF_ENVIRONMENT}}/state-file.txt
                if-no-files-found: error