name: Terraform state list

description: This is a reusable workflow designed to initialise terraform and run terraform state list
on:
  workflow_call:

    inputs:
        execution-environment:
          required: true
          type: string

jobs:
    terraform-show-state:
        runs-on: ubuntu-latest

        environment: ${{inputs.execution-environment}}
        

        defaults:
          run:
            working-directory: ${{vars.TF_ENVIRONMENT}}

        steps:

            - name: Checkout-code
              uses: actions/checkout@v3

            - name: Setup-aws
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{secrets.AWS_ARN}}
                aws-region: ap-south-1
            
            - name: setup-terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: ">= 1.13.0"

            - name: terraform-init
              run: terraform init -backend-config=dev_backend.hcl -migrate-state
            - name: check-resources
              run: terraform state list > state-file.txt
                
             

            - name: upload-state-artifact
              uses: actions/upload-artifact@v4
              with:
                name: state-file-after-destory
                path: ${{vars.TF_ENVIRONMENT}}/state-file.txt
                if-no-files-found: error