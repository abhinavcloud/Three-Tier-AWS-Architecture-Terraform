name: Deployment of AWS Three Tier Architecture

description: This deployment pipeline is used for deployment of AWS Three Tier Architecture via Terraform i Development Environment

on: 
    workflow_call:

      inputs:
        execution-environment:
          required: true
          type: string

      outputs:
        drift-check:
          value: ${{jobs.terraform-drift-check.outputs.drift-check}}



permissions:
  id-token: write
  contents: read

jobs:
    
    terraform-drift-check:

      runs-on: ubuntu-latest

      environment: ${{inputs.execution-environment}}

      defaults:
          run:
            working-directory: ${{vars.TF_ENVIRONMENT}}

      outputs:
        drift-check: ${{steps.drift-check.outputs.exitcode}}

      steps:
 
            - name: Setup-aws
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: arn:aws:iam::806685982094:role/GitHubAuthentication
                aws-region: ap-south-1
            
            - name: setup-terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: ">= 1.13.0"

            - name: terraform-init
              run: terraform init -backend-config=dev_backend.hcl -migrate-state

            - name: terraform-plan-refresh
              run: terraform plan -reresh-only -out=drift-tfplan
            
            - name: terraform-plan-show
              run: |
                    terraform show  drift-tfplan > drift-tfplan.md

            - name: upload-tfplan-artifact
              uses: actions/upload-artifact@v4
              with:
                name: drift-tfplan-md
                path: ./Environments/Dev/drift-tfplan.md
                if-no-files-found: error

            - name: terraform-plan-drift-check
              id: drift-check
              run: |
                terraform plan -refresh-only -detailed-exitcode -out=drift-tfplan
                echo "exitcode=$?" >> $GITHUB_OUTPUT
              continue-on-error: true



            - name: if-drift-plan-failed
              if: ${{steps.drift-check.outputs.drift-check == '1'}}
              run: |
                echo " Plan execution failed"
                exit 1
            
            - name: if-no-drift-detected
              id: no-drift-detected
              if : ${{steps.drift-check.outputs.drift-check == '0'}}
              run: |
                echo " No drift detected. Continue to plan"
            
           
            - name: if-drift-detected-then-create-issue
              if: ${{steps.drift-check.outputs.drift-check == '2'}}
              uses: peter-evans/create-issue-from-file@v5
              with:
                title: "Terraform Drift Detected on Dev Environment"
                content-filepath: drift-tfplan.md 
                labels: drift, dev-environment


